<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrightCart Support — Nova</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --accent: #6c8cff;
    --accent-2: #8f6cff;
    --text: #e7e9ee;
    --muted: #9aa1b1;
    --bubble-user: #2a2f3d;
    --bubble-bot: #1f2430;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background: radial-gradient(circle at top, #1b1e27, var(--bg));
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-app {
    width: 100%;
    max-width: 640px;
    height: 90vh;
    background: var(--panel);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    overflow: hidden;
    border: 1px solid #262b38;
  }
  .header {
    padding: 18px 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .header .title { font-weight: 700; font-size: 16px; }
  .header .subtitle { font-size: 12px; opacity: 0.85; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .msg.bot {
    background: var(--bubble-bot);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: var(--bubble-user);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.typing { color: var(--muted); font-style: italic; }

  .input-row {
    display: flex;
    padding: 14px;
    gap: 10px;
    border-top: 1px solid #262b38;
    background: #12151c;
  }
  .input-row input {
    flex: 1;
    background: #1c202b;
    border: 1px solid #2b303e;
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border: none;
    color: white;
    padding: 0 20px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

  <div class="chat-app">
    <div class="header">
      <div class="avatar">N</div>
      <div>
        <div class="title">Nova — BrightCart Support</div>
        <div class="subtitle">Guided AI assistant</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-row">
      <input id="input" type="text" placeholder="Type your message…" autocomplete="off" />
      <button id="sendBtn">Send</button>
    </div>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  // Full conversation history, kept in memory for this page session
  // and sent back to the server on every request (the server itself
  // is stateless, since it may run as a serverless function).
  let history = [];

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function loadWelcome() {
    try {
      const res = await fetch('/api/welcome');
      const data = await res.json();
      addMessage(data.message, 'bot');
    } catch (e) {
      addMessage("Hi! I'm Nova, your BrightCart support assistant. How can I help today?", 'bot');
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    inputEl.value = '';
    sendBtn.disabled = true;

    const typingEl = addMessage('Nova is typing…', 'bot typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();

      typingEl.remove();

      if (data.error) {
        addMessage(`⚠️ ${data.error}`, 'bot');
      } else {
        addMessage(data.reply, 'bot');
        history = data.history;
      }
    } catch (e) {
      typingEl.remove();
      addMessage('⚠️ Could not reach the server. Please try again.', 'bot');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  loadWelcome();
</script>

</body>
</html>
